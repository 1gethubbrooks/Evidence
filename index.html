<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courtroom Objection Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --wood-dark: #1a0e06;
  --wood-mid: #3b1f0a;
  --wood-light: #6b3a1f;
  --brass: #9a7230;
  --brass-bright: #c9963a;
  --parchment: #f4e8c1;
  --parchment-mid: #e8d4a0;
  --cream: #fdf6e3;
  --ink: #1a0e06;
  --red-robe: #7a1515;
}
html, body { height: 100%; font-family: 'EB Garamond', Georgia, serif; background: var(--wood-dark); color: var(--cream); overflow-x: hidden; }

/* HUD */
#hud { display:flex; align-items:center; justify-content:space-between; padding:8px 18px; background:linear-gradient(90deg,#0e0804,#1a0e06,#0e0804); border-bottom:2px solid var(--brass); position:relative; z-index:20; }
#hud-title { font-family:'Special Elite',monospace; font-size:0.78rem; color:var(--brass-bright); letter-spacing:0.12em; text-transform:uppercase; }
.hud-score { display:flex; gap:14px; }
.hud-pip { text-align:center; background:rgba(0,0,0,0.4); border:1px solid var(--brass); padding:4px 12px; border-radius:2px; }
.hud-pip .lbl { font-size:0.52rem; color:var(--brass-bright); letter-spacing:0.14em; text-transform:uppercase; }
.hud-pip .val { font-size:1.2rem; font-weight:700; color:var(--cream); line-height:1.1; }
#progress-bar-wrap { height:3px; background:rgba(255,255,255,0.08); }
#progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--brass),var(--brass-bright)); transition:width 0.5s ease; }

/* SCENE */
#scene-wrap { position:relative; width:100%; height:340px; overflow:hidden; background:linear-gradient(180deg,#0e0804 0%,#1a0e06 50%,#2a1408 100%); flex-shrink:0; }
#courtroom-svg { width:100%; height:100%; display:block; }
#scene-wrap::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:300px; height:100%; background:radial-gradient(ellipse at 50% 0%,rgba(255,210,120,0.15) 0%,transparent 70%); pointer-events:none; z-index:2; }
#scene-wrap::after { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 45%,transparent 25%,rgba(0,0,0,0.65) 100%),linear-gradient(to bottom,rgba(0,0,0,0.45) 0%,transparent 25%,transparent 72%,rgba(0,0,0,0.55) 100%); pointer-events:none; z-index:3; }

/* Speech bubble */
#speech-bubble { position:absolute; z-index:10; background:var(--cream); border:2px solid var(--brass); border-radius:6px; padding:7px 13px; max-width:210px; font-family:'Special Elite',monospace; font-size:0.7rem; color:var(--ink); line-height:1.45; opacity:0; transition:opacity 0.35s ease,transform 0.35s ease; pointer-events:none; box-shadow:0 4px 18px rgba(0,0,0,0.55); }
#speech-bubble.judge-pos { top:115px; left:50%; transform:translateX(-50%) translateY(-8px); }
#speech-bubble.witness-pos { top:72px; right:7%; transform:translateY(-8px); }
#speech-bubble.show.judge-pos { opacity:1; transform:translateX(-50%) translateY(0); }
#speech-bubble.show.witness-pos { opacity:1; transform:translateY(0); }
#speech-bubble.judge-pos::after { content:''; position:absolute; top:-9px; bottom:auto; left:50%; transform:translateX(-50%); border:5px solid transparent; border-bottom-color:var(--brass); }
#speech-bubble.witness-pos::after { content:''; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:var(--brass); }

/* BOTTOM PANEL */
#bottom-panel { padding:14px 18px 28px; background:linear-gradient(180deg,#0e0804 0%,#140c06 100%); }
#meta-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:6px; }
#topic-badge { font-family:'Special Elite',monospace; font-size:0.58rem; letter-spacing:0.14em; text-transform:uppercase; background:var(--red-robe); color:#f5c8a0; padding:3px 10px; border-radius:2px; }
#case-num { font-size:0.58rem; color:var(--brass); letter-spacing:0.12em; text-transform:uppercase; }

#transcript-scroll { background:rgba(255,255,255,0.03); border:1px solid rgba(154,114,48,0.3); border-radius:3px; padding:11px 15px; margin-bottom:12px; max-height:145px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--brass) transparent; }
#transcript-scroll::-webkit-scrollbar { width:4px; }
#transcript-scroll::-webkit-scrollbar-thumb { background:var(--brass); border-radius:2px; }
.t-line { margin-bottom:6px; font-size:0.85rem; line-height:1.5; }
.t-speaker { font-family:'Special Elite',monospace; font-size:0.67rem; letter-spacing:0.08em; text-transform:uppercase; }
.t-speaker.atty { color:#8ab0d8; }
.t-speaker.wit  { color:#c8a87a; }
.t-speaker.def  { color:#90c888; }
.t-text { color:#e8dcc8; }
.q-prompt { margin-top:10px; padding:8px 12px; background:rgba(154,114,48,0.12); border-left:3px solid var(--brass-bright); font-style:italic; font-size:0.82rem; color:var(--parchment); border-radius:0 2px 2px 0; }

#streak-row { text-align:center; font-family:'Special Elite',monospace; font-size:0.63rem; letter-spacing:0.14em; color:var(--brass-bright); text-transform:uppercase; min-height:16px; margin-bottom:6px; }
#obj-label { font-family:'Special Elite',monospace; font-size:0.68rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--brass-bright); text-align:center; margin-bottom:10px; }
#obj-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:8px; margin-bottom:14px; }
.obj-btn { background:linear-gradient(135deg,#2a1a08,#1e1208); border:1.5px solid var(--brass); border-radius:3px; padding:10px 12px; font-family:'Special Elite',monospace; font-size:0.7rem; letter-spacing:0.05em; text-transform:uppercase; color:var(--parchment); cursor:pointer; transition:all 0.15s ease; text-align:left; }
.obj-btn .rule-tag { display:block; font-size:0.55rem; color:var(--brass); margin-top:3px; letter-spacing:0.08em; }
.obj-btn:hover { background:linear-gradient(135deg,#4a2e10,#3a2008); border-color:var(--brass-bright); color:var(--cream); transform:translateY(-1px); box-shadow:0 3px 12px rgba(0,0,0,0.5); }
.obj-btn.correct { background:linear-gradient(135deg,#0d3020,#0a2018); border-color:#4caf7a; color:#b8f0cc; animation:popGreen 0.35s ease; }
.obj-btn.incorrect { background:linear-gradient(135deg,#3a0808,#280606); border-color:#cc4444; color:#ffbbbb; animation:shakeRed 0.3s ease; }
.obj-btn.reveal { background:linear-gradient(135deg,#0d3020,#0a2018); border-color:#4caf7a; color:#b8f0cc; }
@keyframes popGreen { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
@keyframes shakeRed { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

/* RULING */
#ruling-panel { display:none; background:linear-gradient(135deg,#1e1208,#160e06); border:1.5px solid var(--brass); border-radius:3px; padding:13px 15px; margin-bottom:12px; animation:slideIn 0.3s ease; }
#ruling-panel.show { display:block; }
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.ruling-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.ruling-stamp { font-family:'Special Elite',monospace; font-size:0.82rem; font-weight:700; letter-spacing:0.1em; padding:4px 14px; border-radius:2px; border:2px solid; text-transform:uppercase; flex-shrink:0; }
.ruling-stamp.sustained { color:#b8f0cc; border-color:#4caf7a; background:rgba(76,175,122,0.12); }
.ruling-stamp.overruled { color:#ffbbbb; border-color:#cc4444; background:rgba(204,68,68,0.12); }
.ruling-verdict { font-size:0.82rem; color:var(--parchment-mid); font-style:italic; }
.ruling-explain { font-size:0.78rem; line-height:1.6; color:#d4c4a0; margin-bottom:10px; }
.rule-cite { background:rgba(154,114,48,0.1); border-left:3px solid var(--brass); padding:8px 12px; font-size:0.73rem; color:#c8b888; line-height:1.55; border-radius:0 2px 2px 0; }
.rule-cite strong { color:var(--brass-bright); }

#next-btn { display:none; width:100%; background:linear-gradient(135deg,var(--brass),var(--brass-bright)); color:var(--ink); border:none; border-radius:3px; padding:13px; font-family:'Special Elite',monospace; font-size:0.88rem; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; box-shadow:0 3px 14px rgba(0,0,0,0.5); }
#next-btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
#next-btn.show { display:block; }

/* INTRO SCREEN */
#intro-screen { display:none; padding:36px 22px 60px; background:linear-gradient(180deg,#0e0804,#140c06); min-height:100vh; }
#intro-screen.show { display:block; }
.intro-title { font-family:'Special Elite',monospace; font-size:1.3rem; color:var(--brass-bright); letter-spacing:0.1em; text-transform:uppercase; text-align:center; margin-bottom:4px; }
.intro-sub { font-size:0.82rem; color:var(--parchment-mid); font-style:italic; text-align:center; margin-bottom:24px; }
.intro-section-label { font-family:'Special Elite',monospace; font-size:0.62rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--brass); margin-bottom:10px; border-bottom:1px solid rgba(154,114,48,0.3); padding-bottom:5px; }
#topic-checklist { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:8px; margin-bottom:20px; }
.topic-check { display:flex; align-items:flex-start; gap:10px; background:rgba(255,255,255,0.03); border:1px solid rgba(154,114,48,0.25); border-radius:3px; padding:10px 12px; cursor:pointer; transition:all 0.15s; }
.topic-check:hover { border-color:var(--brass); background:rgba(154,114,48,0.06); }
.topic-check input[type=checkbox] { margin-top:2px; accent-color:var(--brass-bright); width:14px; height:14px; flex-shrink:0; cursor:pointer; }
.topic-check-label { font-family:'Special Elite',monospace; font-size:0.68rem; letter-spacing:0.05em; text-transform:uppercase; color:var(--parchment); line-height:1.5; }
.topic-check-label span { display:block; font-family:'EB Garamond',serif; font-style:italic; font-size:0.78rem; text-transform:none; letter-spacing:0; color:var(--brass); margin-top:1px; }
.intro-controls { display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
.select-all-btn { background:none; border:1px solid var(--brass); color:var(--brass); font-family:'Special Elite',monospace; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; padding:5px 12px; border-radius:2px; cursor:pointer; transition:all 0.15s; }
.select-all-btn:hover { background:rgba(154,114,48,0.15); }
#intro-count { font-size:0.75rem; color:var(--parchment-mid); font-style:italic; }
#start-btn { width:100%; background:linear-gradient(135deg,var(--brass),var(--brass-bright)); color:var(--ink); border:none; border-radius:3px; padding:14px; font-family:'Special Elite',monospace; font-size:0.9rem; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; box-shadow:0 3px 14px rgba(0,0,0,0.5); margin-top:8px; }
#start-btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
#start-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; filter:none; }

/* END */
#end-screen { display:none; padding:36px 22px 60px; background:linear-gradient(180deg,#0e0804,#140c06); min-height:100vh; }
#end-screen.show { display:block; }
.end-gavel { font-size:3.5rem; margin-bottom:14px; text-align:center; }
.end-title { font-family:'Special Elite',monospace; font-size:1.4rem; color:var(--brass-bright); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; text-align:center; }
.end-score { font-size:4rem; font-weight:700; color:var(--cream); line-height:1; margin:10px 0; text-align:center; }
.end-verdict { font-size:0.9rem; color:var(--parchment-mid); font-style:italic; max-width:480px; margin:0 auto 28px; line-height:1.7; text-align:center; }
.missed-section { background:rgba(255,255,255,0.03); border:1.5px solid rgba(204,68,68,0.35); border-radius:3px; padding:16px 18px; margin-bottom:22px; text-align:left; }
.missed-section-title { font-family:'Special Elite',monospace; font-size:0.65rem; letter-spacing:0.16em; text-transform:uppercase; color:#cc6666; margin-bottom:12px; }
.missed-rule-item { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid rgba(255,255,255,0.06); }
.missed-rule-item:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
.missed-rule-name { font-family:'Special Elite',monospace; font-size:0.7rem; letter-spacing:0.06em; text-transform:uppercase; color:#ffbbbb; margin-bottom:3px; }
.missed-rule-cite { font-size:0.78rem; color:#c8b888; line-height:1.55; }
.missed-rule-cite strong { color:var(--brass-bright); }
.restart-btn { display:block; width:100%; background:linear-gradient(135deg,var(--brass),var(--brass-bright)); color:var(--ink); border:none; padding:13px 40px; font-family:'Special Elite',monospace; font-size:0.88rem; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; border-radius:3px; transition:all 0.2s; text-align:center; }
.restart-btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
</style>
</head>
<body>

<div id="hud">
  <div id="hud-title">⚖ Objection Simulator · Law 410</div>
  <div class="hud-score">
    <div class="hud-pip"><div class="lbl">Correct</div><div class="val" id="scoreCorrect">0</div></div>
    <div class="hud-pip"><div class="lbl">Incorrect</div><div class="val" id="scoreWrong">0</div></div>
  </div>
</div>
<div id="progress-bar-wrap"><div id="progress-bar-fill" style="width:0%"></div></div>

<!-- INTRO SCREEN -->
<div id="intro-screen" class="show">
  <div class="intro-title">⚖ Objection Simulator</div>
  <div class="intro-sub">Select the Federal Rules of Evidence topics you want to practice</div>
  <div class="intro-section-label">Choose Your Topics</div>
<div style="margin-top:10px;">
<label style="font-family:'Special Elite',monospace;font-size:0.65rem;color:#c9963a;">
Difficulty:
<select id="difficulty-select" onchange="updateDifficulty()" style="margin-left:8px;">
<option value="All">All</option>
<option value="Beginner">Beginner</option>
<option value="Intermediate">Intermediate</option>
<option value="Advanced">Advanced</option>
</select>
</label>
</div>

  <div class="intro-controls">
    <button class="select-all-btn" onclick="selectAll(true)">Select All</button>
    <button class="select-all-btn" onclick="selectAll(false)">Clear All</button>
    <span id="intro-count"></span>
  </div>
  <div id="topic-checklist"></div>
  <button id="start-btn" onclick="beginSession()" disabled>Begin Session</button>
</div>

<div id="game-area" style="display:none;">
  <!-- IMMERSIVE COURTROOM SCENE -->
  <div id="scene-wrap">
    <svg id="courtroom-svg" viewBox="0 0 900 340" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="wg" x="0" y="0" width="5" height="60" patternUnits="userSpaceOnUse">
          <line x1="0" y1="0" x2="0.3" y2="60" stroke="rgba(0,0,0,0.09)" stroke-width="0.5"/>
          <line x1="2.5" y1="0" x2="2.8" y2="60" stroke="rgba(255,255,255,0.025)" stroke-width="0.4"/>
        </pattern>
        <linearGradient id="benchG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#6b3010"/>
          <stop offset="100%" stop-color="#1a0804"/>
        </linearGradient>
        <linearGradient id="witnessG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#4e2a0e"/>
          <stop offset="100%" stop-color="#180a02"/>
        </linearGradient>
        <radialGradient id="ceilL" cx="50%" cy="0%" r="70%">
          <stop offset="0%" stop-color="#ffe890" stop-opacity="0.22"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <linearGradient id="robeG" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#250606"/>
          <stop offset="55%" stop-color="#500e0e"/>
          <stop offset="100%" stop-color="#380808"/>
        </linearGradient>
        <filter id="sh" x="-15%" y="-15%" width="130%" height="150%">
          <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.75)"/>
        </filter>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="floorG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1a0a04"/>
          <stop offset="100%" stop-color="#0e0602"/>
        </linearGradient>
        <radialGradient id="witnessSpot" cx="72%" cy="10%" r="55%">
          <stop offset="0%" stop-color="#ffe890" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>

      <!-- Back wall -->
      <rect width="900" height="210" fill="#180a04"/>
      <!-- Wall panels -->
      <rect x="30" y="12" width="190" height="155" rx="2" fill="none" stroke="#3a1c08" stroke-width="1.5"/>
      <rect x="36" y="18" width="178" height="143" rx="1" fill="none" stroke="#2a1206" stroke-width="0.8"/>
      <rect x="340" y="8" width="220" height="165" rx="2" fill="none" stroke="#3a1c08" stroke-width="1.5"/>
      <rect x="346" y="14" width="208" height="153" rx="1" fill="none" stroke="#2a1206" stroke-width="0.8"/>
      <rect x="680" y="12" width="190" height="155" rx="2" fill="none" stroke="#3a1c08" stroke-width="1.5"/>
      <rect x="686" y="18" width="178" height="143" rx="1" fill="none" stroke="#2a1206" stroke-width="0.8"/>
      <!-- Wainscot rail -->
      <rect x="0" y="198" width="900" height="7" fill="#3a1c08"/>
      <rect x="0" y="198" width="900" height="3" fill="#9a7230" opacity="0.35"/>

      <!-- Ceiling glow -->
      <ellipse cx="450" cy="0" rx="380" ry="180" fill="url(#ceilL)"/>
      <!-- Ceiling fixture -->
      <rect x="380" y="0" width="140" height="7" rx="2" fill="#6a5020" opacity="0.85"/>
      <rect x="390" y="3" width="120" height="4" fill="#ffe890" opacity="0.65" filter="url(#glow)"/>

      <!-- Flags -->
      <rect x="328" y="8" width="3" height="120" fill="#7a5030"/>
      <rect x="331" y="8" width="52" height="36" fill="#b82020"/>
      <rect x="331" y="12.5" width="52" height="2.8" fill="#fff" opacity="0.85"/>
      <rect x="331" y="18.1" width="52" height="2.8" fill="#b82020"/>
      <rect x="331" y="23.7" width="52" height="2.8" fill="#fff" opacity="0.85"/>
      <rect x="331" y="29.3" width="52" height="2.8" fill="#b82020"/>
      <rect x="331" y="34.9" width="52" height="2.8" fill="#fff" opacity="0.85"/>
      <rect x="331" y="8" width="24" height="20" fill="#283888"/>
      <rect x="569" y="8" width="3" height="120" fill="#7a5030"/>
      <rect x="517" y="8" width="52" height="36" fill="#283888"/>
      <circle cx="543" cy="26" r="11" fill="none" stroke="#e8c840" stroke-width="1.5"/>
      <text x="543" y="30" text-anchor="middle" fill="#e8c840" font-size="10">★</text>

      <!-- ── JUDGE BENCH ── -->
      <!-- Riser platform -->
      <rect x="255" y="162" width="390" height="16" rx="1" fill="#2a1208"/>
      <rect x="255" y="162" width="390" height="16" fill="url(#wg)" opacity="0.35"/>
      <rect x="255" y="175" width="390" height="2.5" fill="#c9963a" opacity="0.4"/>
      <!-- Bench main face -->
      <rect x="268" y="92" width="364" height="72" rx="3" fill="url(#benchG)" filter="url(#sh)"/>
      <rect x="268" y="92" width="364" height="72" rx="3" fill="url(#wg)" opacity="0.25"/>
      <!-- Bench top surface -->
      <rect x="260" y="86" width="380" height="10" rx="2" fill="#5a2e12"/>
      <rect x="260" y="86" width="380" height="10" fill="url(#wg)" opacity="0.35"/>
      <rect x="260" y="93" width="380" height="1.8" fill="#c9963a" opacity="0.38"/>
      <!-- Panel details on bench -->
      <rect x="282" y="103" width="76" height="46" rx="2" fill="none" stroke="#9a7230" stroke-width="0.8" opacity="0.45"/>
      <rect x="412" y="103" width="76" height="46" rx="2" fill="none" stroke="#9a7230" stroke-width="0.8" opacity="0.45"/>
      <rect x="542" y="103" width="76" height="46" rx="2" fill="none" stroke="#9a7230" stroke-width="0.8" opacity="0.45"/>
      <!-- Nameplate -->
      <rect x="376" y="107" width="148" height="17" rx="1" fill="#c9963a" opacity="0.78"/>
      <text x="450" y="120" text-anchor="middle" fill="#18080a" font-family="'EB Garamond'" font-size="7.5" font-weight="bold" letter-spacing="1.2">THE HON. COURT</text>
      <!-- Water glass on bench -->
      <rect x="508" y="78" width="10" height="12" rx="1" fill="#8ac8e0" opacity="0.35"/>
      <ellipse cx="513" cy="78" rx="5" ry="2" fill="#8ac8e0" opacity="0.4"/>
      <!-- Bench microphone -->
      <rect x="447" y="70" width="2.5" height="18" fill="#555"/>
      <ellipse cx="448.5" cy="69" rx="5" ry="6" fill="#2a2a2a" stroke="#666" stroke-width="0.6"/>

      <!-- ── JUDGE CHARACTER (drawn by JS) ── -->
      <g id="judge-group"></g>

let shuffled=[], current=0, correct=0, wrong=0, streak=0, answered=false, missedScenarios=[], activeScenarios=[];
let TOTAL = 0;

const judgeLines = {
  start:  ["Counselor, proceed. We're ready for your objection.","The witness is on the stand. Make your record.","Court is in session. Choose your objection carefully.","I'm waiting, counselor."],
  correct:["Sustained. Well done, counselor.","That's exactly right. Objection sustained.","The court agrees. Objection is sustained.","Your opponent's question is improper. Sustained."],
  wrong:  ["Overruled. Review your Federal Rules.","The court disagrees. Objection overruled.","Overruled — that is not the applicable rule here.","Counsel, overruled. Know your rules."],
  streak3:"Three correct in a row. The bench takes notice.",
  streak5:"Five straight sustained objections. Impressive advocacy."
};

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function showBubble(text, who){
  const b=document.getElementById('speech-bubble');
  b.className='';
  b.textContent=text;
  void b.offsetWidth;
  b.className = who==='judge' ? 'judge-pos' : 'witness-pos';
  requestAnimationFrame(()=>b.classList.add('show'));
}
function hideBubble(){document.getElementById('speech-bubble').classList.remove('show');}

function loadScenario(){
  answered=false;
  const s=shuffled[current];
  document.getElementById('progress-bar-fill').style.width=(current/TOTAL*100)+'%';
  document.getElementById('topic-badge').textContent=s.topic;
  document.getElementById('topic-badge').style.visibility='hidden';
  document.getElementById('case-num').textContent=`Case No. ${s.caseNum} · Q${current+1}/${TOTAL}`;
  document.getElementById('streak-row').textContent='';
  document.getElementById('ruling-panel').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
  randomizeCharacters();
  showBubble(pick(judgeLines.start),'judge');
  let html='';
  s.setup.forEach(line=>{
    html+=`<div class="t-line"><span class="t-speaker ${line.role}">${line.speaker}:</span> <span class="t-text">${line.text}</span></div>`;
  });
  html+=`<div class="q-prompt">${s.question}</div>`;
  document.getElementById('transcript-content').innerHTML=html;
  document.getElementById('transcript-scroll').scrollTop=0;
  const opts=shuffle(s.options);
  let grid='';
  opts.forEach(opt=>{
    const safe=opt.replace(/'/g,"\\'");
    grid+=`<button class="obj-btn" onclick="handleObj(this,'${safe}')">${opt}<span class="rule-tag" style="visibility:hidden">${s.rules[opt]||''}</span></button>`;
  });
  document.getElementById('obj-grid').innerHTML=grid;
}

function handleObj(btn,selected){
  if(answered)return;
  answered=true;
  const s=shuffled[current];
  const ok=selected===s.correct;
  // Reveal rule tags and topic badge now that question is answered
  document.querySelectorAll('.obj-btn .rule-tag').forEach(t=>t.style.visibility='visible');
  document.getElementById('topic-badge').style.visibility='visible';
  document.querySelectorAll('.obj-btn').forEach(b=>{
    if(b.childNodes[0].textContent.trim()===s.correct)b.classList.add('reveal');
  });
  btn.classList.remove('reveal');
  btn.classList.add(ok?'correct':'incorrect');
  if(ok){correct++;streak++;document.getElementById('scoreCorrect').textContent=correct;}
  else{wrong++;streak=0;document.getElementById('scoreWrong').textContent=wrong; missedScenarios.push(s);}
  if(streak>=2)document.getElementById('streak-row').textContent=`🔥 ${streak}-Objection Streak`;
  let line;
  if(streak>=5)line=judgeLines.streak5;
  else if(streak===3)line=judgeLines.streak3;
  else line=ok?pick(judgeLines.correct):pick(judgeLines.wrong);
  showBubble(line,'judge');
  const stamp=document.getElementById('ruling-stamp');
  stamp.textContent=s.ruling;
  stamp.className='ruling-stamp '+(s.ruling==='SUSTAINED'?'sustained':'overruled');
  document.getElementById('ruling-verdict').textContent=ok?`Correct — ${s.correct}`:`Incorrect. The right answer: ${s.correct}`;
  document.getElementById('ruling-explain').textContent=s.explanation;
  document.getElementById('rule-cite').innerHTML=s.ruleText;
  document.getElementById('ruling-panel').classList.add('show');
  const nb=document.getElementById('next-btn');
  nb.textContent=current<TOTAL-1?'Next Witness ›':'See Final Verdict ›';
  nb.classList.add('show');
}

function nextQuestion(){
  current++;
  hideBubble();
  if(current>=TOTAL)showEnd();
  else{loadScenario();window.scrollTo({top:0,behavior:'smooth'});}
}

function showEnd(){
  document.getElementById('game-area').style.display='none';
  document.getElementById('end-screen').classList.add('show');
  document.getElementById('end-score').textContent=`${correct}/${TOTAL}`;
  const pct=correct/TOTAL;
  let v;
  if(pct===1)v="Perfect score. The bench would be proud. You know these rules cold.";
  else if(pct>=0.8)v="Excellent command of the FRE. Review the few rules you missed and you'll be untouchable.";
  else if(pct>=0.6)v="Solid showing, counselor. A few distinctions need more attention.";
  else if(pct>=0.4)v="Keep studying. Focus on the rules listed below.";
  else v="The judge is concerned. Hit the textbook — pay special attention to the rules below.";
  document.getElementById('end-verdict').textContent=v;
  // Build missed rules summary
  if(missedScenarios.length>0){
    const seen=new Set();
    let html='';
    missedScenarios.forEach(s=>{
      const key=s.correct+'|'+s.topic;
      if(!seen.has(key)){
        seen.add(key);
        html+=`<div class="missed-rule-item"><div class="missed-rule-name">${s.topic}</div><div class="missed-rule-cite">${s.ruleText}</div></div>`;
      }
    });
    document.getElementById('missed-rules-list').innerHTML=html;
    document.getElementById('missed-section').style.display='block';
  } else {
    document.getElementById('missed-section').style.display='none';
  }
}

function showIntro(){
  document.getElementById('end-screen').classList.remove('show');
  document.getElementById('game-area').style.display='none';
  document.getElementById('intro-screen').classList.add('show');
  updateIntroCount();
}

function restartGame(){
  shuffled=shuffle(activeScenarios);
  TOTAL=shuffled.length;
  current=0;correct=0;wrong=0;streak=0;answered=false;missedScenarios=[];
  document.getElementById('scoreCorrect').textContent=0;
  document.getElementById('scoreWrong').textContent=0;
  document.getElementById('game-area').style.display='block';
  document.getElementById('end-screen').classList.remove('show');
  window.scrollTo({top:0});
  loadScenario();
}

// ── INTRO LOGIC ──
function buildIntroScreen(){
  const list=document.getElementById('topic-checklist');
  list.innerHTML='';
  scenarios.forEach((s,i)=>{
    const div=document.createElement('div');
    div.className='topic-check';
    div.innerHTML=`<input type="checkbox" id="tc${i}" value="${i}" checked onchange="updateIntroCount()">
      <label class="topic-check-label" for="tc${i}">${s.topic}<span>${s.question.replace(/"/g,'&quot;')}</span></label>`;
    list.appendChild(div);
  });
  updateIntroCount();
}

function updateIntroCount(){
  const checked=document.querySelectorAll('#topic-checklist input:checked').length;
  document.getElementById('intro-count').textContent=`${checked} question${checked!==1?'s':''} selected`;
  document.getElementById('start-btn').disabled=checked===0;
}

function selectAll(val){
  document.querySelectorAll('#topic-checklist input').forEach(cb=>cb.checked=val);
  updateIntroCount();
}


function updateDifficulty(){
const level=document.getElementById('difficulty-select').value;
document.querySelectorAll('#topic-checklist input').forEach(cb=>{
const scenario=scenarios[+cb.value];
if(level==="All"){
cb.parentElement.style.display="flex";
}else{
cb.parentElement.style.display=(scenario.difficulty===level)?"flex":"none";
}
});
}

function beginSession(){
  const checked=[...document.querySelectorAll('#topic-checklist input:checked')].map(cb=>scenarios[+cb.value]);
  if(checked.length===0)return;
  activeScenarios=checked;
  document.getElementById('intro-screen').classList.remove('show');
  restartGame();
  document.getElementById('game-area').style.display='block';
}


// ═══════════════════════════════════════
//  DIVERSE CHARACTER SYSTEM
// ═══════════════════════════════════════

// Skin tones: light → deep
const skinTones = [
  {base:'#f5d5b0', shadow:'#d4a870', lip:'#c0704a', eyeCol:'#3a2010'},  // light warm
  {base:'#e8c090', shadow:'#c89050', lip:'#b06040', eyeCol:'#2a1a08'},  // light medium
  {base:'#d4a060', shadow:'#b07830', lip:'#a05030', eyeCol:'#1e1008'},  // medium
  {base:'#b87840', shadow:'#8a5020', lip:'#804020', eyeCol:'#1a0e04'},  // medium deep
  {base:'#8a5228', shadow:'#6a3818', lip:'#5a2810', eyeCol:'#120800'},  // deep brown
  {base:'#5a3018', shadow:'#3a1c08', lip:'#3a1808', eyeCol:'#0a0400'},  // deep
  {base:'#3a1c0c', shadow:'#281208', lip:'#281008', eyeCol:'#080400'},  // very deep
];

// Hair styles: each returns SVG string, cx/cy = head center
const hairStyles = [
  // Short cropped
  (cx,cy,col)=>`<ellipse cx="${cx}" cy="${cy-14}" rx="16" ry="8" fill="${col}"/><rect x="${cx-16}" y="${cy-14}" width="32" height="7" fill="${col}"/>`,
  // Bald
  (cx,cy,col)=>`<ellipse cx="${cx}" cy="${cy-13}" rx="15" ry="6" fill="${col}" opacity="0.3"/>`,
  // Afro
  (cx,cy,col)=>`<ellipse cx="${cx}" cy="${cy-12}" rx="20" ry="16" fill="${col}"/><ellipse cx="${cx}" cy="${cy-8}" rx="16" ry="12" fill="${col}"/>`,
  // Long straight (down past shoulders)
  (cx,cy,col)=>`<ellipse cx="${cx}" cy="${cy-14}" rx="17" ry="8" fill="${col}"/>
    <rect x="${cx-17}" y="${cy-14}" width="34" height="30" rx="4" fill="${col}"/>`,
  // Bob / chin-length
  (cx,cy,col)=>`<ellipse cx="${cx}" cy="${cy-14}" rx="17" ry="8" fill="${col}"/>
    <rect x="${cx-17}" y="${cy-14}" width="34" height="18" rx="3" fill="${col}"/>`,
  // Curly medium
  (cx,cy,col)=>`<ellipse cx="${cx}" cy="${cy-12}" rx="19" ry="14" fill="${col}"/>
    <ellipse cx="${cx-8}" cy="${cy-8}" rx="8" ry="10" fill="${col}"/>
    <ellipse cx="${cx+8}" cy="${cy-8}" rx="8" ry="10" fill="${col}"/>`,
  // Locs / dreadlocks down
  (cx,cy,col)=>`<ellipse cx="${cx}" cy="${cy-13}" rx="16" ry="8" fill="${col}"/>
    <rect x="${cx-5}" y="${cy-10}" width="4" height="24" rx="2" fill="${col}"/>
    <rect x="${cx+1}" y="${cy-10}" width="4" height="26" rx="2" fill="${col}"/>
    <rect x="${cx-11}" y="${cy-10}" width="4" height="20" rx="2" fill="${col}"/>
    <rect x="${cx+7}" y="${cy-10}" width="4" height="22" rx="2" fill="${col}"/>`,
  // Ponytail / bun
  (cx,cy,col)=>`<ellipse cx="${cx}" cy="${cy-14}" rx="16" ry="8" fill="${col}"/>
    <rect x="${cx-16}" y="${cy-14}" width="32" height="8" fill="${col}"/>
    <circle cx="${cx+14}" cy="${cy-18}" r="6" fill="${col}"/>`,
  // Gray/silver (older)
  (cx,cy,col)=>`<ellipse cx="${cx}" cy="${cy-14}" rx="16" ry="8" fill="#c0b8b0"/>
    <rect x="${cx-16}" y="${cy-14}" width="32" height="7" fill="#c0b8b0"/>`,
  // Wavy shoulder-length
  (cx,cy,col)=>`<ellipse cx="${cx}" cy="${cy-14}" rx="17" ry="8" fill="${col}"/>
    <path d="M${cx-17} ${cy-8} Q${cx-20} ${cy} ${cx-17} ${cy+8} Q${cx-19} ${cy+16} ${cx-16} ${cy+22}" stroke="${col}" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M${cx+17} ${cy-8} Q${cx+20} ${cy} ${cx+17} ${cy+8} Q${cx+19} ${cy+16} ${cx+16} ${cy+22}" stroke="${col}" stroke-width="8" fill="none" stroke-linecap="round"/>
    <rect x="${cx-17}" y="${cy-14}" width="34" height="8" fill="${col}"/>`,
];

const hairColors = ['#1a0e04','#2a1a08','#0a0806','#6a4a20','#c0a040','#e0c860','#c8c0b0','#8a3810','#d06820'];

// Outfits: judge robe variants, witness outfits
const judgeRobes = ['#1e0404','#0a1a10','#0a0a1e','#1a1008']; // dark red, dark green, dark navy, near-black
const witnessOutfits = [
  {body:'#1e3050', shirt:'#f0e8cc', accent:'#7a1818', isTie:true},   // navy suit + tie
  {body:'#2a2a2a', shirt:'#e8e0d0', accent:'#1a3858', isTie:true},   // charcoal suit
  {body:'#3a2a50', shirt:'#f4f0e8', accent:'#5a2a10', isTie:true},   // purple suit
  {body:'#1a3a1a', shirt:'#f0ede8', accent:'#8a1818', isTie:true},   // forest green
  {body:'#8a1818', shirt:'#f4f0e8', accent:'#1a3858', isTie:false},  // burgundy blazer, no tie
  {body:'#2a1808', shirt:'#e8e0cc', accent:'#3a1a08', isTie:false},  // brown blazer
  {body:'#1a1a3a', shirt:'#e8e8f4', accent:'#8a1818', isTie:false},  // dark blue blazer, blouse
];

// Face shape variation
const faceShapes = [
  {rx:16,ry:18},  // oval
  {rx:17,ry:17},  // round
  {rx:15,ry:19},  // long
  {rx:18,ry:16},  // wide
  {rx:14,ry:17},  // narrow
];

// Body width variants (witness)
const bodyWidths = [56, 62, 70, 52, 66];

function svgNS(tag,attrs,children=''){
  const a = Object.entries(attrs).map(([k,v])=>`${k}="${v}"`).join(' ');
  return `<${tag} ${a}>${children}</${tag}>`;
}

function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function drawJudge(skin, hairStyle, hairColor, robeColor, face, hasGlasses){
  const cx=450, cy=38;
  const robe = robeColor;
  let svg = '';

  // Robe body
  svg += `<ellipse cx="${cx}" cy="64" rx="31" ry="29" fill="${robe}" filter="url(#sh)"/>`;
  // Collar bands
  svg += `<path d="M436 53 Q450 62 464 53 L459 48 Q450 56 441 48Z" fill="#e8dfc8" opacity="0.92"/>`;
  // Robe sleeves
  svg += `<path d="M419 60 Q413 73 420 83" stroke="${robe}" stroke-width="14" fill="none" stroke-linecap="round"/>`;
  svg += `<path d="M481 60 Q487 73 480 83" stroke="${robe}" stroke-width="14" fill="none" stroke-linecap="round"/>`;
  // Hand
  svg += `<circle cx="478" cy="82" r="5" fill="${skin.base}"/>`;
  // Gavel
  svg += `<rect x="479" y="74" width="20" height="5" rx="2" fill="#7a4020" transform="rotate(-28 479 74)"/>`;
  svg += `<rect x="490" y="63" width="9" height="11" rx="1.5" fill="#5a2e0e" transform="rotate(-28 490 63)"/>`;
  // Head (behind hair)
  svg += `<ellipse cx="${cx}" cy="${cy}" rx="${face.rx}" ry="${face.ry}" fill="${skin.base}" filter="url(#sh)"/>`;
  // Hair (drawn after head so it's on top)
  svg += hairStyles[hairStyle](cx, cy, hairColor);
  // Eyes
  svg += `<ellipse cx="${cx-6.5}" cy="${cy-2}" rx="2.2" ry="1.9" fill="${skin.eyeCol}"/>`;
  svg += `<ellipse cx="${cx+6.5}" cy="${cy-2}" rx="2.2" ry="1.9" fill="${skin.eyeCol}"/>`;
  // Glasses (optional)
  if(hasGlasses){
    svg += `<path d="M${cx-12} ${cy-2} Q${cx-6.5} ${cy-5.5} ${cx-1} ${cy-2} Q${cx-6.5} ${cy+1.5} ${cx-12} ${cy-2}Z" fill="none" stroke="#4a4a4a" stroke-width="1.1"/>`;
    svg += `<path d="M${cx+1} ${cy-2} Q${cx+6.5} ${cy-5.5} ${cx+12} ${cy-2} Q${cx+6.5} ${cy+1.5} ${cx+1} ${cy-2}Z" fill="none" stroke="#4a4a4a" stroke-width="1.1"/>`;
    svg += `<line x1="${cx-1}" y1="${cy-2}" x2="${cx+1}" y2="${cy-2}" stroke="#4a4a4a" stroke-width="0.9"/>`;
  }
  // Nose
  svg += `<path d="M${cx-2.5} ${cy+1} Q${cx} ${cy+5} ${cx+2.5} ${cy+1}" fill="none" stroke="${skin.shadow}" stroke-width="0.9"/>`;
  // Mouth stern
  svg += `<line x1="${cx-7}" y1="${cy+6}" x2="${cx+7}" y2="${cy+6}" stroke="${skin.shadow}" stroke-width="1.2"/>`;

  return svg;
}

function drawWitness(skin, hairStyle, hairColor, outfit, face, bodyWidth){
  const cx=728, cy=67;
  const bx = cx - bodyWidth/2;
  let svg = '';

  // Body
  svg += `<rect x="${bx}" y="78" width="${bodyWidth}" height="32" rx="4" fill="${outfit.body}" filter="url(#sh)"/>`;
  // Shirt/blouse front
  svg += `<rect x="${cx-5}" y="78" width="10" height="22" fill="${outfit.shirt}" opacity="0.85"/>`;
  if(outfit.isTie){
    svg += `<polygon points="${cx},84 ${cx-3},102 ${cx},100 ${cx+3},102" fill="${outfit.accent}"/>`;
  } else {
    // Collar / lapels instead
    svg += `<path d="M${cx-5} 78 L${cx-9} 90 L${cx} 88 L${cx+9} 90 L${cx+5} 78Z" fill="${outfit.accent}" opacity="0.7"/>`;
  }
  // Arms on rail
  svg += `<path d="M${bx+4} 96 Q${bx+2} 108 ${bx+9} 110" stroke="${outfit.body}" stroke-width="11" fill="none" stroke-linecap="round"/>`;
  svg += `<path d="M${bx+bodyWidth-4} 96 Q${bx+bodyWidth+2} 108 ${bx+bodyWidth-9} 110" stroke="${outfit.body}" stroke-width="11" fill="none" stroke-linecap="round"/>`;
  svg += `<ellipse cx="${bx+9}" cy="110" rx="6" ry="5.5" fill="${skin.base}"/>`;
  svg += `<ellipse cx="${bx+bodyWidth-9}" cy="110" rx="6" ry="5.5" fill="${skin.base}"/>`;
  // Head
  svg += `<ellipse cx="${cx}" cy="${cy}" rx="${face.rx}" ry="${face.ry}" fill="${skin.base}" filter="url(#sh)"/>`;
  // Hair
  svg += hairStyles[hairStyle](cx, cy, hairColor);
  // Eyes (slightly shifted toward camera/left = toward judge)
  svg += `<ellipse cx="${cx-6}" cy="${cy-1}" rx="2.3" ry="2.1" fill="${skin.eyeCol}"/>`;
  svg += `<ellipse cx="${cx+5}" cy="${cy-1}" rx="2.3" ry="2.1" fill="${skin.eyeCol}"/>`;
  // Pupils shifted
  svg += `<ellipse cx="${cx-6.7}" cy="${cy-1}" rx="1.1" ry="1.1" fill="#050300"/>`;
  svg += `<ellipse cx="${cx+4.3}" cy="${cy-1}" rx="1.1" ry="1.1" fill="#050300"/>`;
  // Raised eyebrows (nervous)
  svg += `<path d="M${cx-10} ${cy-5} Q${cx-6} ${cy-7.5} ${cx-2.5} ${cy-5}" fill="none" stroke="${hairColor}" stroke-width="1.3"/>`;
  svg += `<path d="M${cx+2.5} ${cy-5} Q${cx+6} ${cy-7.5} ${cx+10} ${cy-5}" fill="none" stroke="${hairColor}" stroke-width="1.3"/>`;
  // Nose
  svg += `<path d="M${cx-2.5} ${cy+2} Q${cx} ${cy+5.5} ${cx+2.5} ${cy+2}" fill="none" stroke="${skin.shadow}" stroke-width="0.8"/>`;
  // Mouth — slightly open
  svg += `<path d="M${cx-6} ${cy+8} Q${cx} ${cy+11.5} ${cx+6} ${cy+8}" fill="none" stroke="${skin.shadow}" stroke-width="1.1"/>`;

  return svg;
}

function drawBailiff(skin, hairStyle, hairColor, face){
  const cx=120, cy=148;
  const bw=54;
  const bx=cx-bw/2;
  // Uniform color — dark navy/khaki
  const uniform='#1e2a3a';
  const shirt='#2a3a4e';
  const badge='#c9963a';
  let svg='';

  // Body / uniform jacket
  svg+=`<rect x="${bx}" y="${cy+18}" width="${bw}" height="38" rx="4" fill="${uniform}" filter="url(#sh)"/>`;
  // Shirt strip
  svg+=`<rect x="${cx-5}" y="${cy+18}" width="10" height="26" fill="${shirt}" opacity="0.9"/>`;
  // Tie / lanyard
  svg+=`<polygon points="${cx},${cy+22} ${cx-3},${cy+40} ${cx},${cy+38} ${cx+3},${cy+40}" fill="#8a1818"/>`;
  // Badge on chest
  svg+=`<rect x="${cx+10}" y="${cy+24}" width="10" height="8" rx="1" fill="${badge}" opacity="0.9"/>`;
  svg+=`<text x="${cx+15}" y="${cy+31}" text-anchor="middle" fill="#18080a" font-size="4" font-family="serif">★</text>`;
  // Arms at sides
  svg+=`<path d="M${bx+4} ${cy+24} Q${bx} ${cy+40} ${bx+6} ${cy+52}" stroke="${uniform}" stroke-width="12" fill="none" stroke-linecap="round"/>`;
  svg+=`<path d="M${bx+bw-4} ${cy+24} Q${bx+bw} ${cy+40} ${bx+bw-6} ${cy+52}" stroke="${uniform}" stroke-width="12" fill="none" stroke-linecap="round"/>`;
  // Hands
  svg+=`<ellipse cx="${bx+6}" cy="${cy+53}" rx="6" ry="5" fill="${skin.base}"/>`;
  svg+=`<ellipse cx="${bx+bw-6}" cy="${cy+53}" rx="6" ry="5" fill="${skin.base}"/>`;
  // Head
  svg+=`<ellipse cx="${cx}" cy="${cy}" rx="${face.rx}" ry="${face.ry}" fill="${skin.base}" filter="url(#sh)"/>`;
  // Hair
  svg+=hairStyles[hairStyle](cx, cy, hairColor);
  // Eyes — looking toward center
  svg+=`<ellipse cx="${cx+5}" cy="${cy-1}" rx="2.2" ry="2" fill="${skin.eyeCol}"/>`;
  svg+=`<ellipse cx="${cx-5}" cy="${cy-1}" rx="2.2" ry="2" fill="${skin.eyeCol}"/>`;
  svg+=`<ellipse cx="${cx+5.8}" cy="${cy-1}" rx="1" ry="1" fill="#050300"/>`;
  svg+=`<ellipse cx="${cx-4.2}" cy="${cy-1}" rx="1" ry="1" fill="#050300"/>`;
  // Brow — neutral/stern
  svg+=`<path d="M${cx-9} ${cy-5} Q${cx-5} ${cy-6.5} ${cx-1} ${cy-5}" fill="none" stroke="${hairColor}" stroke-width="1.2"/>`;
  svg+=`<path d="M${cx+1} ${cy-5} Q${cx+5} ${cy-6.5} ${cx+9} ${cy-5}" fill="none" stroke="${hairColor}" stroke-width="1.2"/>`;
  // Nose
  svg+=`<path d="M${cx-2} ${cy+2} Q${cx} ${cy+5} ${cx+2} ${cy+2}" fill="none" stroke="${skin.shadow}" stroke-width="0.8"/>`;
  // Mouth — neutral
  svg+=`<line x1="${cx-5}" y1="${cy+7}" x2="${cx+5}" y2="${cy+7}" stroke="${skin.shadow}" stroke-width="1.1"/>`;
  // Legs
  svg+=`<rect x="${cx-14}" y="${cy+54}" width="12" height="28" rx="3" fill="#141e2a"/>`;
  svg+=`<rect x="${cx+2}" y="${cy+54}" width="12" height="28" rx="3" fill="#141e2a"/>`;
  // Shoes
  svg+=`<ellipse cx="${cx-8}" cy="${cy+83}" rx="9" ry="4" fill="#0e0e0e"/>`;
  svg+=`<ellipse cx="${cx+8}" cy="${cy+83}" rx="9" ry="4" fill="#0e0e0e"/>`;
  // "BAILIFF" label under feet
  svg+=`<text x="${cx}" y="${cy+96}" text-anchor="middle" fill="#6a5020" font-family="'Special Elite',monospace" font-size="5.5" letter-spacing="1">BAILIFF</text>`;

  return svg;
}

function randomizeCharacters(){
  // Pick random judge
  const jSkin   = pickRandom(skinTones);
  const jHairC  = pickRandom(hairColors);
  const jHairS  = Math.floor(Math.random()*hairStyles.length);
  const jRobe   = pickRandom(judgeRobes);
  const jFace   = pickRandom(faceShapes);
  const jGlass  = Math.random() > 0.45;
  document.getElementById('judge-group').innerHTML = drawJudge(jSkin, jHairS, jHairC, jRobe, jFace, jGlass);

  // Pick random witness
  const wSkin   = pickRandom(skinTones);
  const wHairC  = pickRandom(hairColors);
  const wHairS  = Math.floor(Math.random()*hairStyles.length);
  const wOutfit = pickRandom(witnessOutfits);
  const wFace   = pickRandom(faceShapes);
  const wBody   = pickRandom(bodyWidths);
  document.getElementById('witness-group').innerHTML = drawWitness(wSkin, wHairS, wHairC, wOutfit, wFace, wBody);

  // Pick random bailiff
  const bSkin   = pickRandom(skinTones);
  const bHairC  = pickRandom(hairColors);
  const bHairS  = Math.floor(Math.random()*hairStyles.length);
  const bFace   = pickRandom(faceShapes);
  document.getElementById('bailiff-group').innerHTML = drawBailiff(bSkin, bHairS, bHairC, bFace);
}

buildIntroScreen();
randomizeCharacters();
</script>
